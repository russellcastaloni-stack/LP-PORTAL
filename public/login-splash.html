document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

deg) scale(.40); opacity: 0; }\n    }\n    @keyframes bob {\n      0%,100% { transform: translateY(0); }\n      50%     { transform: translateY(-7px); }\n    }\n    @keyframes trailfade {\n      0%   { opacity: 0; transform: scaleY(.4); }\n      6%   { opacity: 1; transform: scaleY(1.08); }\n      26%  { opacity: 1; transform: scaleY(1); }\n      33%  { opacity: 0; transform: scaleY(.5); }\n      100% { opacity: 0; transform: scaleY(.4); }\n    }\n    @keyframes reveal {\n      0%,31%   { opacity: 0; transform: translateY(16px); }\n      40%      { opacity: 1; transform: translateY(0); }\n      72%      { opacity: 1; transform: translateY(0); }\n      80%,100% { opacity: 0; transform: translateY(-10px); }\n    }\n    @keyframes lineDraw {\n      0%,31%   { transform: scaleX(0); opacity: 0; }\n      44%      { transform: scaleX(1); opacity: 1; }\n      72%      { transform: scaleX(1); opacity: 1; }\n      80%,100% { transform: scaleX(0); opacity: 0; }\n    }\n    @keyframes brandGlow {\n      0%,30%   { opacity: 0; }\n      42%      { opacity: .9; }\n      60%      { opacity: .55; }\n      72%      { opacity: .8; }\n      82%,100% { opacity: 0; }\n    }\n    @keyframes idleGlow {\n      0%,100% { opacity: .55; transform: translate(-50%,-50%) scale(1); }\n      50%     { opacity: 1;  transform: translate(-50%,-50%) scale(1.18); }\n    }\n    @keyframes twinkle {\n      0%,100% { opacity: .15; }\n      50%     { opacity: 1; }\n    }\n    @keyframes drift {\n      0%   { transform: translate(0,0); }\n      100% { transform: translate(-40px, 30px); }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"splash\" ref=\"{{ rootRef }}\" style=\"{{ rootVars }}\">\n\n  <!-- starfield -->\n  <div style=\"position: absolute; inset: 0; animation: drift 30s linear infinite alternate;\">\n    <sc-for list=\"{{ stars }}\" as=\"star\" hint-placeholder-count=\"0\">\n      <div style=\"{{ star.style }}\"><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- vignette -->\n  <div style=\"position: absolute; inset: 0; pointer-events: none; background: radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(4,6,14,.7) 100%);\"><\u002Fdiv>\n\n  <!-- soft brand glow behind parked rocket -->\n  <div style=\"position: absolute; left: 50%; top: 50%; width: 620px; height: 620px; transform: translate(-50%,-50%); border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--accent, #FF7A2D) 55%, white) 0%, var(--accent, #FF7A2D) 18%, transparent 62%); filter: blur(20px); opacity: 0; animation: brandGlow var(--dur, 7s) ease-in-out var(--play, infinite);\"><\u002Fdiv>\n\n  <!-- flying rocket assembly -->\n  <div style=\"position: absolute; left: 50%; top: 50%; will-change: transform, opacity; animation: flight var(--dur, 7s) cubic-bezier(.45,.02,.25,1) var(--play, infinite);\">\n\n    <!-- exhaust comet trail (points down = behind nose) -->\n    <div style=\"position: absolute; left: 50%; top: 56%; width: 60px; height: 460px; transform: translateX(-50%); transform-origin: top center; animation: trailfade var(--dur, 7s) ease-out var(--play, infinite);\">\n      <div style=\"position: absolute; inset: 0; transform: translateX(-50%); left: 50%; width: 38px; border-radius: 50% 50% 50% 50% / 8% 8% 100% 100%; background: linear-gradient(to bottom, #ffffff 0%, color-mix(in oklab, var(--accent, #FF7A2D) 60%, white) 14%, var(--accent, #FF7A2D) 42%, transparent 100%); filter: blur(7px);\"><\u002Fdiv>\n      <div style=\"position: absolute; inset: 0; left: 50%; transform: translateX(-50%); width: 120px; background: linear-gradient(to bottom, color-mix(in oklab, var(--accent, #FF7A2D) 50%, white) 0%, var(--accent, #FF7A2D) 30%, transparent 80%); filter: blur(26px); opacity: .6;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- idle nozzle glow -->\n    <div style=\"position: absolute; left: 50%; top: 58%; width: 130px; height: 130px; border-radius: 50%; background: radial-gradient(circle, color-mix(in oklab, var(--accent, #FF7A2D) 60%, white) 0%, var(--accent, #FF7A2D) 30%, transparent 70%); filter: blur(10px); animation: idleGlow 2.6s ease-in-out infinite;\"><\u002Fdiv>\n\n    <!-- rocket mark -->\n    <div style=\"animation: bob 3.6s ease-in-out infinite;\">\n      <img src=\"c1e68099-6129-4bfc-948e-b65d6355f7aa\" alt=\"Launchpad rocket\" style=\"display: block; width: 184px; height: auto; filter: drop-shadow(0 0 26px rgba(120,170,255,.35));\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- wordmark -->\n  <sc-if value=\"{{ showWordmark }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position: absolute; left: 50%; top: 50%; transform: translate(-50%, 168px); width: 100%; text-align: center; pointer-events: none;\">\n      <div style=\"display: inline-block; height: 2px; width: 64px; background: var(--accent, #FF7A2D); transform-origin: center; animation: lineDraw var(--dur, 7s) cubic-bezier(.45,.02,.25,1) var(--play, infinite); margin-bottom: 22px;\"><\u002Fdiv>\n      <div style=\"animation: reveal var(--dur, 7s) cubic-bezier(.45,.02,.25,1) var(--play, infinite);\">\n        <div style=\"color: #fff; font-size: 38px; font-weight: 600; letter-spacing: .42em; text-indent: .42em; line-height: 1;\">LAUNCHPAD<\u002Fdiv>\n        <div style=\"color: color-mix(in oklab, var(--accent, #FF7A2D) 80%, white); font-size: 13px; font-weight: 500; letter-spacing: .58em; text-indent: .58em; margin-top: 14px;\">PHILIPPINES<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100vh&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#54D6FF&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#FF7A2D&quot;,&quot;#FF5E5B&quot;,&quot;#FFC24B&quot;,&quot;#54D6FF&quot;],&quot;section&quot;:&quot;Look&quot;},&quot;bg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#080B16&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#080B16&quot;,&quot;#0B1020&quot;,&quot;#0E0A1C&quot;,&quot;#04121A&quot;],&quot;section&quot;:&quot;Look&quot;},&quot;showWordmark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;loop&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Playback&quot;},&quot;speed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;unit&quot;:&quot;x&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Playback&quot;}}\">\nclass Component extends DCLogic {\n  rootRef = React.createRef();\n\n  applyVars() {\n    const el = this.rootRef.current;\n    if (!el) return;\n    const p = this.props || {};\n    const speed = p.speed ?? 1;\n    el.style.setProperty('--accent', p.accent ?? '#FF7A2D');\n    el.style.setProperty('--bg', p.bg ?? '#080B16');\n    el.style.setProperty('--dur', (7 / (speed || 1)).toFixed(2) + 's');\n    el.style.setProperty('--play', (p.loop ?? true) ? 'infinite' : '1');\n  }\n\n  componentDidMount() { this.applyVars(); }\n  componentDidUpdate() { this.applyVars(); }\n\n  makeStars() {\n    const rnd = (a, b) => a + Math.random() * (b - a);\n    const out = [];\n    for (let i = 0; i < 80; i++) {\n      const big = Math.random() < 0.18;\n      const size = big ? rnd(2, 3.2) : rnd(0.8, 1.6);\n      out.push({\n        style: {\n          position: 'absolute',\n          left: rnd(0, 100).toFixed(2) + '%',\n          top: rnd(0, 100).toFixed(2) + '%',\n          width: size.toFixed(2) + 'px',\n          height: size.toFixed(2) + 'px',\n          borderRadius: '50%',\n          background: big ? 'rgba(180,205,255,1)' : 'rgba(255,255,255,.9)',\n          boxShadow: big ? '0 0 6px rgba(150,185,255,.8)' : 'none',\n          animation: `twinkle ${rnd(2.4, 6).toFixed(2)}s ease-in-out ${rnd(0, 5).toFixed(2)}s infinite`,\n        },\n      });\n    }\n    return out;\n  }\n\n  renderVals() {\n    const p = this.props || {};\n    const accent = p.accent ?? '#FF7A2D';\n    const bg = p.bg ?? '#080B16';\n    const speed = p.speed ?? 1;\n    const loop = p.loop ?? true;\n    const dur = (7 / (speed || 1)).toFixed(2) + 's';\n    if (!this._stars) this._stars = this.makeStars();\n    return {\n      stars: this._stars,\n      showWordmark: p.showWordmark ?? true,\n      rootRef: this.rootRef,\n      rootVars: {\n        position: 'relative',\n        width: '100%',\n        height: '100vh',\n        minHeight: '540px',\n        overflow: 'hidden',\n        fontFamily: \"'Space Grotesk', system-ui, sans-serif\",\n        background: `radial-gradient(130% 95% at 50% 18%, #16203f 0%, #0b1024 42%, ${bg} 100%)`,\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
